name: iOS CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  ios-build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install npm dependencies
        run: npm install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build iOS simulator app for branches/PRs
        if: startsWith(github.ref, 'refs/heads/') || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: |
          xcodebuild \
            -workspace ios/OpsPulse.xcworkspace \
            -scheme OpsPulse \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build

      - name: Archive iOS app for tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          xcodebuild \
            -workspace ios/OpsPulse.xcworkspace \
            -scheme OpsPulse \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath ios/build/OpsPulse.xcarchive \
            archive

      - name: Upload iOS archive artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: ios/build/OpsPulse.xcarchive
          if-no-files-found: error
