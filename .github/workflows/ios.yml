name: iOS CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  ios-build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install npm dependencies
        run: npm install

      - name: Patch React Native boost podspec
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path("node_modules/react-native/third-party-podspecs/boost.podspec")
          text = p.read_text()

          old = "https://boostorg.jfrog.io/artifactory/main/release/1.76.0/source/boost_1_76_0.tar.bz2"
          new = "https://archives.boost.io/release/1.76.0/source/boost_1_76_0.tar.bz2"

          if old in text:
              text = text.replace(old, new)
              p.write_text(text)
              print("Patched boost.podspec successfully.")
          else:
              print("boost.podspec already patched or URL not found.")
          PY

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod deintegrate || true
          rm -rf Pods Podfile.lock
          pod cache clean --all || true
          pod install --repo-update

      - name: Build iOS app for simulator on branch/PR/manual runs
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/')
        run: |
          xcodebuild \
            -workspace ios/OpsPulse.xcworkspace \
            -scheme OpsPulse \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build

      - name: Archive iOS app for version tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          xcodebuild \
            -workspace ios/OpsPulse.xcworkspace \
            -scheme OpsPulse \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath ios/build/OpsPulse.xcarchive \
            archive

      - name: Upload iOS archive artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcarchive
          path: ios/build/OpsPulse.xcarchive
          if-no-files-found: error
